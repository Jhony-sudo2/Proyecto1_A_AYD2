<div class="min-h-screen bg-slate-950 flex items-center justify-center px-4 py-12"
  style="background-image: radial-gradient(ellipse at 20% 50%, rgba(56, 189, 248, 0.07) 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, rgba(99, 102, 241, 0.08) 0%, transparent 50%);">

  <div class="w-full max-w-2xl">

    <!-- Header -->
    <div class="text-center mb-10">
      <div
        class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-gradient-to-br from-sky-400 to-indigo-500 shadow-lg shadow-sky-500/30 mb-4">
        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5" />
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-white tracking-tight">Crear Congreso</h1>
      <p class="text-slate-400 text-sm mt-1">Completa los datos para publicar tu evento</p>
    </div>

    <!-- Card -->
    <div class="bg-slate-900 border border-slate-800 rounded-2xl p-8 shadow-2xl shadow-black/40">

      <!-- Nombre -->
      <div class="mb-5">
        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-widest mb-2">Nombre del
          congreso</label>
        <input type="text" [(ngModel)]="newCongress.name" name="name"
          placeholder="Ej. Congreso Internacional de Tecnología"
          class="w-full bg-slate-800 text-white text-sm placeholder-slate-600 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500 transition-all duration-200" />
      </div>

      <!-- Descripción -->
      <div class="mb-5">
        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-widest mb-2">Descripción</label>
        <textarea [(ngModel)]="newCongress.description" name="description" rows="3"
          placeholder="Describe el congreso..."
          class="w-full bg-slate-800 text-white text-sm placeholder-slate-600 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500 transition-all duration-200 resize-none"></textarea>
      </div>

      <!-- Imagen URL y Precio -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-5">

        <div>
          <label class="block text-xs font-semibold text-slate-400 uppercase tracking-widest mb-2">Imagen del
            congreso</label>
          <div class="relative">
            <label
              class="flex items-center gap-3 w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 cursor-pointer hover:border-sky-500 transition-all duration-200 group">
              <svg class="w-5 h-5 text-slate-500 group-hover:text-sky-400 transition-colors shrink-0" fill="none"
                stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" />
              </svg>
              <span class="text-sm truncate" [ngClass]="newCongress.imageUrl ? 'text-sky-400' : 'text-slate-600'">
                {{ newCongress.imageUrl ? 'Imagen cargada ✓' : 'Selecciona una imagen...' }}
              </span>
              <input type="file" accept="image/*" (change)="onImageSelected($event)" class="hidden" />
            </label>
          </div>
        </div>

        <div>
          <label class="block text-xs font-semibold text-slate-400 uppercase tracking-widest mb-2">Precio (Q)</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M12 6v12m-3-2.818l.879.659c1.171.879 3.07.879 4.242 0 1.172-.879 1.172-2.303 0-3.182C13.536 12.219 12.768 12 12 12c-.725 0-1.45-.22-2.003-.659-1.106-.879-1.106-2.303 0-3.182s2.9-.879 4.006 0l.415.33M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
              </svg>
            </span>
            <input type="number" [(ngModel)]="newCongress.price" name="price" min="0" step="0.01" placeholder="0.00"
              class="w-full bg-slate-800 text-white text-sm placeholder-slate-600 border border-slate-700 rounded-xl pl-10 pr-4 py-3 focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500 transition-all duration-200" />
          </div>
        </div>

      </div>

      <!-- Ubicación -->
      <div class="mb-5">
        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-widest mb-2">Ubicación</label>
        <div class="relative">
          <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z" />
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z" />
            </svg>
          </span>
          <select [(ngModel)]="newCongress.locationId" name="locationId"
            class="w-full bg-slate-800 text-white text-sm border border-slate-700 rounded-xl pl-10 pr-4 py-3 focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500 transition-all duration-200 appearance-none">
            <option value="" disabled selected class="text-slate-600">Selecciona una ubicación</option>
            <option *ngFor="let loc of locations" [value]="loc.id" class="bg-slate-800">
              {{ loc.name }} — {{ loc.city }}, {{ loc.country }}
            </option>
          </select>
          <span class="absolute inset-y-0 right-0 flex items-center pr-3 text-slate-500 pointer-events-none">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
            </svg>
          </span>
        </div>
      </div>

      <!-- Fechas -->
      <div class="mb-5">
        <p class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-3">Fechas y horarios</p>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">

          <div>
            <label class="block text-xs text-slate-500 mb-1">Cierre de convocatoria</label>
            <input type="datetime-local" [(ngModel)]="newCongress.endCallDate" name="endCallDate"
              class="w-full bg-slate-800 text-white text-sm border border-slate-700 rounded-xl px-3 py-3 focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500 transition-all duration-200" />
          </div>

          <div>
            <label class="block text-xs text-slate-500 mb-1">Fecha de inicio</label>
            <input type="datetime-local" [(ngModel)]="newCongress.startDate" name="startDate"
              class="w-full bg-slate-800 text-white text-sm border border-slate-700 rounded-xl px-3 py-3 focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500 transition-all duration-200" />
          </div>

          <div>
            <label class="block text-xs text-slate-500 mb-1">Fecha de fin</label>
            <input type="datetime-local" [(ngModel)]="newCongress.endDate" name="endDate"
              class="w-full bg-slate-800 text-white text-sm border border-slate-700 rounded-xl px-3 py-3 focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500 transition-all duration-200" />
          </div>

        </div>
      </div>

      <!-- Divider -->
      <div class="h-px bg-slate-800 my-6"></div>

      <!-- Botón -->
      <button (click)="createCongress()"
        class="w-full py-3 rounded-xl font-semibold text-sm text-white bg-gradient-to-r from-sky-500 to-indigo-500 hover:from-sky-400 hover:to-indigo-400 shadow-lg shadow-sky-500/20 active:scale-95 transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-sky-500 focus:ring-offset-2 focus:ring-offset-slate-900">
        Crear Congreso
      </button>

    </div>
  </div>
</div>

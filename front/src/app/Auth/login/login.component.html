<div class="min-h-screen bg-slate-950 flex items-center justify-center px-4"
  style="background-image: radial-gradient(ellipse at 20% 50%, rgba(56, 189, 248, 0.07) 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, rgba(99, 102, 241, 0.08) 0%, transparent 50%);">

  <div class="w-full max-w-md">

    <!-- Brand -->
    <div class="text-center mb-10">
      <div
        class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-gradient-to-br from-sky-400 to-indigo-500 shadow-lg shadow-sky-500/30 mb-4">
        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-white tracking-tight">Bienvenido de nuevo</h1>
      <p class="text-slate-400 text-sm mt-1">Inicia sesión en tu cuenta</p>
    </div>

    <!-- Card -->
    <div class="bg-slate-900 border border-slate-800 rounded-2xl p-8 shadow-2xl shadow-black/40">

      <!-- Email -->
      <div class="mb-5">
        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-widest mb-2">
          Correo electrónico
        </label>
        <div class="relative">
          <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75" />
            </svg>
          </span>
          <input type="email" [(ngModel)]="data.email" name="email" placeholder="tucorreo@ejemplo.com"
            class="w-full bg-slate-800 text-white text-sm placeholder-slate-600 border border-slate-700 rounded-xl pl-10 pr-4 py-3 focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500 transition-all duration-200" />
        </div>
      </div>

      <!-- Password -->
      <div class="mb-7">
        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-widest mb-2">
          Contraseña
        </label>
        <div class="relative">
          <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
            </svg>
          </span>
          <input type="password" [(ngModel)]="data.password" name="password" placeholder="••••••••"
            class="w-full bg-slate-800 text-white text-sm placeholder-slate-600 border border-slate-700 rounded-xl pl-10 pr-4 py-3 focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500 transition-all duration-200" />
        </div>
        <div class="text-right mt-2">
          <a routerLink="/forgot-password" class="text-xs text-sky-400 hover:text-sky-300 transition-colors">
            ¿Olvidaste tu contraseña?
          </a>
        </div>
      </div>

      <!-- Botón -->
      <button (click)="login()"
        class="w-full py-3 rounded-xl font-semibold text-sm text-white bg-gradient-to-r from-sky-500 to-indigo-500 hover:from-sky-400 hover:to-indigo-400 shadow-lg shadow-sky-500/20 active:scale-95 transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-sky-500 focus:ring-offset-2 focus:ring-offset-slate-900">
        Iniciar sesión
      </button>

      <div class="flex items-center my-6">
        <div class="flex-1 h-px bg-slate-800"></div>
        <span class="px-3 text-xs text-slate-600">o</span>
        <div class="flex-1 h-px bg-slate-800"></div>
      </div>

      <p class="text-center text-sm text-slate-500">
        ¿No tienes cuenta?
        <a href="#" class="text-sky-400 hover:text-sky-300 font-medium transition-colors ml-1">
          Regístrate aquí
        </a>
      </p>

    </div>

    <p class="text-center text-xs text-slate-600 mt-6">Plataforma segura · Cifrado SSL</p>

  </div>
</div>

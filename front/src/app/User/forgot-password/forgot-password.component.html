<div class="min-h-screen bg-slate-950 flex items-center justify-center px-4"
     style="background-image: radial-gradient(ellipse at 20% 50%, rgba(56, 189, 248, 0.07) 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, rgba(99, 102, 241, 0.08) 0%, transparent 50%);">

  <div class="w-full max-w-md">

    <!-- Brand -->
    <div class="text-center mb-10">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-gradient-to-br from-sky-400 to-indigo-500 shadow-lg shadow-sky-500/30 mb-4">
        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-white tracking-tight">Recuperar contraseña</h1>
      <p class="text-slate-400 text-sm mt-1">
        {{ step === 1 ? 'Ingresa tu correo para recibir el código' : 'Ingresa el código y tu nueva contraseña' }}
      </p>
    </div>

    <!-- Stepper -->
    <div class="flex items-center gap-2 mb-8">
      <div class="flex-1 flex items-center gap-2">
        <div class="w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold shrink-0"
             [ngClass]="step >= 1 ? 'bg-sky-500 text-white' : 'bg-slate-800 text-slate-500'">1</div>
        <span class="text-xs font-semibold" [ngClass]="step >= 1 ? 'text-sky-400' : 'text-slate-600'">Correo</span>
      </div>
      <div class="flex-1 h-px" [ngClass]="step >= 2 ? 'bg-sky-500' : 'bg-slate-800'"></div>
      <div class="flex-1 flex items-center gap-2 justify-end">
        <div class="w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold shrink-0"
             [ngClass]="step >= 2 ? 'bg-sky-500 text-white' : 'bg-slate-800 text-slate-500'">2</div>
        <span class="text-xs font-semibold" [ngClass]="step >= 2 ? 'text-sky-400' : 'text-slate-600'">Código</span>
      </div>
    </div>

    <!-- Card -->
    <div class="bg-slate-900 border border-slate-800 rounded-2xl p-8 shadow-2xl shadow-black/40">

      <!-- PASO 1: Email -->
      <div *ngIf="step === 1">
        <div class="mb-6">
          <label class="block text-xs font-semibold text-slate-400 uppercase tracking-widest mb-2">
            Correo electrónico
          </label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75" />
              </svg>
            </span>
            <input type="email" [(ngModel)]="email" name="email"
              placeholder="tucorreo@ejemplo.com"
              class="w-full bg-slate-800 text-white text-sm placeholder-slate-600 border border-slate-700 rounded-xl pl-10 pr-4 py-3 focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500 transition-all duration-200" />
          </div>
          <p class="text-slate-600 text-xs mt-2">Te enviaremos un código de verificación a este correo</p>
        </div>

        <button (click)="sendCode()"
          class="w-full py-3 rounded-xl font-semibold text-sm text-white bg-gradient-to-r from-sky-500 to-indigo-500 hover:from-sky-400 hover:to-indigo-400 shadow-lg shadow-sky-500/20 active:scale-95 transition-all duration-200">
          Enviar código
        </button>
      </div>

      <!-- PASO 2: Código + nueva contraseña -->
      <div *ngIf="step === 2">

        <!-- Email (readonly, referencia) -->
        <div class="bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-3 mb-5 flex items-center gap-2">
          <svg class="w-4 h-4 text-slate-500 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75" />
          </svg>
          <span class="text-slate-400 text-sm truncate">{{ email }}</span>
          <button (click)="step = 1" class="ml-auto text-xs text-sky-400 hover:text-sky-300 shrink-0 transition-colors">
            Cambiar
          </button>
        </div>

        <!-- Código -->
        <div class="mb-5">
          <label class="block text-xs font-semibold text-slate-400 uppercase tracking-widest mb-2">
            Código de verificación
          </label>
          <input type="text" [(ngModel)]="code" name="code"
            placeholder="Ej. 123456"
            maxlength="10"
            class="w-full bg-slate-800 text-white text-sm placeholder-slate-600 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500 transition-all duration-200 tracking-widest text-center font-mono text-lg" />
          <p class="text-slate-600 text-xs mt-2 text-center">Revisa tu bandeja de entrada y carpeta de spam</p>
        </div>

        <!-- Nueva contraseña -->
        <div class="mb-7">
          <label class="block text-xs font-semibold text-slate-400 uppercase tracking-widest mb-2">
            Nueva contraseña
          </label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
              </svg>
            </span>
            <input [type]="showPassword ? 'text' : 'password'"
              [(ngModel)]="newPassword" name="newPassword"
              placeholder="••••••••"
              class="w-full bg-slate-800 text-white text-sm placeholder-slate-600 border border-slate-700 rounded-xl pl-10 pr-10 py-3 focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500 transition-all duration-200" />
            <button type="button" (click)="showPassword = !showPassword"
              class="absolute inset-y-0 right-0 flex items-center pr-3 text-slate-500 hover:text-slate-300">
              <svg *ngIf="!showPassword" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              </svg>
              <svg *ngIf="showPassword" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />
              </svg>
            </button>
          </div>
        </div>

        <button (click)="confirm()"
          class="w-full py-3 rounded-xl font-semibold text-sm text-white bg-gradient-to-r from-sky-500 to-indigo-500 hover:from-sky-400 hover:to-indigo-400 shadow-lg shadow-sky-500/20 active:scale-95 transition-all duration-200">
          Confirmar nueva contraseña
        </button>

        <!-- Reenviar código -->
        <div class="text-center mt-4">
          <button (click)="sendCode()"
            class="text-xs text-slate-500 hover:text-sky-400 transition-colors">
            ¿No recibiste el código? Reenviar
          </button>
        </div>
      </div>

    </div>

    <p class="text-center text-sm text-slate-500 mt-6">
      <a routerLink="/login" class="text-sky-400 hover:text-sky-300 transition-colors flex items-center justify-center gap-1">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
        </svg>
        Volver al inicio de sesión
      </a>
    </p>

  </div>
</div>

<div class="min-h-screen bg-slate-950 px-4 py-12"
     style="background-image: radial-gradient(ellipse at 20% 50%, rgba(56, 189, 248, 0.07) 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, rgba(99, 102, 241, 0.08) 0%, transparent 50%);">

  <div class="max-w-6xl mx-auto">

    <!-- Header -->
    <div class="text-center mb-12">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-gradient-to-br from-sky-400 to-indigo-500 shadow-lg shadow-sky-500/30 mb-4">
        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0zM19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z" />
        </svg>
      </div>
      <h1 class="text-3xl font-bold text-white tracking-tight mb-2">Ubicaciones</h1>
      <p class="text-slate-400 text-sm">Gestiona y crea los espacios disponibles</p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">

      <!-- Formulario crear -->
      <div class="lg:col-span-1">
        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-2xl shadow-black/40 sticky top-6">

          <h2 class="text-white font-bold text-lg mb-6 flex items-center gap-2">
            <svg class="w-5 h-5 text-sky-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
            </svg>
            Nueva ubicación
          </h2>

          <!-- Nombre -->
          <div class="mb-4">
            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-widest mb-2">Nombre</label>
            <input
              type="text"
              [(ngModel)]="locationCreate.name"
              name="name"
              placeholder="Ej. Centro de Convenciones"
              class="w-full bg-slate-800 text-white text-sm placeholder-slate-600 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500 transition-all duration-200"
            />
          </div>

          <!-- Dirección -->
          <div class="mb-4">
            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-widest mb-2">Dirección</label>
            <input
              type="text"
              [(ngModel)]="locationCreate.address"
              name="address"
              placeholder="Ej. 6a Av. 12-34, Zona 10"
              class="w-full bg-slate-800 text-white text-sm placeholder-slate-600 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500 transition-all duration-200"
            />
          </div>

          <!-- Ciudad -->
          <div class="mb-4">
            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-widest mb-2">Ciudad</label>
            <input
              type="text"
              [(ngModel)]="locationCreate.city"
              name="city"
              placeholder="Ej. Guatemala"
              class="w-full bg-slate-800 text-white text-sm placeholder-slate-600 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500 transition-all duration-200"
            />
          </div>

          <!-- País -->
          <div class="mb-6">
            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-widest mb-2">País</label>
            <input
              type="text"
              [(ngModel)]="locationCreate.country"
              name="country"
              placeholder="Ej. Guatemala"
              class="w-full bg-slate-800 text-white text-sm placeholder-slate-600 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500 transition-all duration-200"
            />
          </div>

          <button
            (click)="crear()"
            class="w-full py-3 rounded-xl font-semibold text-sm text-white bg-gradient-to-r from-sky-500 to-indigo-500 hover:from-sky-400 hover:to-indigo-400 shadow-lg shadow-sky-500/20 active:scale-95 transition-all duration-200">
            Crear ubicación
          </button>

        </div>
      </div>

      <!-- Listado -->
      <div class="lg:col-span-2">

        <!-- Empty -->
        <div *ngIf="locations.length === 0" class="text-center py-24 text-slate-600">
          <svg class="w-14 h-14 mx-auto mb-4 opacity-30" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0zM19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z" />
          </svg>
          <p>No hay ubicaciones registradas</p>
        </div>

        <!-- Grid -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div *ngFor="let loc of locations"
               (click)="goToRooms(loc.id)"
               class="bg-slate-900 border border-slate-800 rounded-2xl p-5 cursor-pointer hover:border-sky-500/50 hover:shadow-lg hover:shadow-sky-500/10 hover:-translate-y-1 transition-all duration-200 group">

            <div class="flex items-start justify-between mb-4">
              <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-sky-500/20 to-indigo-500/20 border border-sky-500/20 flex items-center justify-center">
                <svg class="w-5 h-5 text-sky-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0zM19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z" />
                </svg>
              </div>
              <svg class="w-4 h-4 text-slate-600 group-hover:text-sky-400 transition-colors" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
              </svg>
            </div>

            <h3 class="text-white font-bold mb-1 group-hover:text-sky-400 transition-colors">{{ loc.name }}</h3>
            <p class="text-slate-500 text-xs mb-3">{{ loc.address }}</p>

            <div class="flex items-center gap-1 text-slate-600 text-xs">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 21a9.004 9.004 0 008.716-6.747M12 21a9.004 9.004 0 01-8.716-6.747M12 21c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9S9.515 3 12 3m0 0a8.997 8.997 0 017.843 4.582M12 3a8.997 8.997 0 00-7.843 4.582m15.686 0A11.953 11.953 0 0112 10.5c-2.998 0-5.74-1.1-7.843-2.918m15.686 0A8.959 8.959 0 0121 12c0 .778-.099 1.533-.284 2.253" />
              </svg>
              {{ loc.city }}, {{ loc.country }}
            </div>

          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<div class="min-h-screen bg-slate-950 px-4 py-12"
     style="background-image: radial-gradient(ellipse at 20% 50%, rgba(56, 189, 248, 0.07) 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, rgba(99, 102, 241, 0.08) 0%, transparent 50%);">

  <div class="max-w-2xl mx-auto">

    <!-- Info del congreso -->
    <div class="bg-slate-900 border border-slate-800 rounded-2xl p-5 mb-6 flex items-center gap-4">
      <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-sky-500/20 to-indigo-500/20 border border-sky-500/20 flex items-center justify-center shrink-0">
        <svg class="w-6 h-6 text-sky-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5" />
        </svg>
      </div>
      <div class="flex-1 min-w-0">
        <p class="text-slate-500 text-xs uppercase tracking-widest mb-0.5">Enviando propuesta para</p>
        <h2 class="text-white font-bold truncate">{{ congress.name }}</h2>
        <p class="text-slate-500 text-xs">{{ congress.organizationName }} · {{ congress.locationName }}</p>
      </div>
      <div class="shrink-0 text-right">
        <p class="text-slate-500 text-xs mb-0.5">Cierre</p>
        <p class="text-sky-400 text-xs font-semibold">{{ congress.endCallDate | date:'dd MMM yyyy' }}</p>
      </div>
    </div>

    <!-- Formulario -->
    <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-2xl shadow-black/40">

      <div class="mb-6">
        <h1 class="text-xl font-bold text-white">Nueva propuesta</h1>
        <p class="text-slate-500 text-sm mt-1">Completa los datos para enviar tu propuesta al congreso</p>
      </div>

      <!-- Nombre -->
      <div class="mb-5">
        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-widest mb-2">Título de la propuesta</label>
        <input type="text" [(ngModel)]="proposalCreate.name" name="name"
          placeholder="Ej. Introducción a la Inteligencia Artificial"
          class="w-full bg-slate-800 text-white text-sm placeholder-slate-600 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500 transition-all duration-200" />
      </div>

      <!-- Descripción -->
      <div class="mb-5">
        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-widest mb-2">Descripción</label>
        <textarea [(ngModel)]="proposalCreate.description" name="description" rows="4"
          placeholder="Describe el contenido y objetivos de tu propuesta..."
          class="w-full bg-slate-800 text-white text-sm placeholder-slate-600 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500 transition-all duration-200 resize-none"></textarea>
      </div>

      <!-- Tipo -->
      <div class="mb-8">
        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-widest mb-3">Tipo de propuesta</label>
        <div class="grid grid-cols-2 gap-3">

          <label class="relative cursor-pointer">
            <input type="radio" [(ngModel)]="proposalCreate.type" name="type" [value]="ProposalType.CONFERENCE" class="sr-only" />
            <div class="flex items-center gap-3 p-4 rounded-xl border-2 transition-all duration-200"
                 [ngClass]="proposalCreate.type === ProposalType.CONFERENCE
                   ? 'border-sky-500 bg-sky-500/10'
                   : 'border-slate-700 bg-slate-800 hover:border-slate-600'">
              <div class="w-9 h-9 rounded-xl flex items-center justify-center shrink-0"
                   [ngClass]="proposalCreate.type === ProposalType.CONFERENCE ? 'bg-sky-500/20' : 'bg-slate-700'">
                <svg class="w-5 h-5" [ngClass]="proposalCreate.type === ProposalType.CONFERENCE ? 'text-sky-400' : 'text-slate-500'"
                     fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M12 18.75a6 6 0 006-6v-1.5m-6 7.5a6 6 0 01-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 01-3-3V4.5a3 3 0 116 0v8.25a3 3 0 01-3 3z" />
                </svg>
              </div>
              <div>
                <p class="text-sm font-semibold" [ngClass]="proposalCreate.type === ProposalType.CONFERENCE ? 'text-sky-400' : 'text-slate-300'">Conferencia</p>
                <p class="text-xs text-slate-500">Presentación expositiva</p>
              </div>
            </div>
          </label>

          <label class="relative cursor-pointer">
            <input type="radio" [(ngModel)]="proposalCreate.type" name="type" [value]="ProposalType.WORKSHOP" class="sr-only" />
            <div class="flex items-center gap-3 p-4 rounded-xl border-2 transition-all duration-200"
                 [ngClass]="proposalCreate.type === ProposalType.WORKSHOP
                   ? 'border-indigo-500 bg-indigo-500/10'
                   : 'border-slate-700 bg-slate-800 hover:border-slate-600'">
              <div class="w-9 h-9 rounded-xl flex items-center justify-center shrink-0"
                   [ngClass]="proposalCreate.type === ProposalType.WORKSHOP ? 'bg-indigo-500/20' : 'bg-slate-700'">
                <svg class="w-5 h-5" [ngClass]="proposalCreate.type === ProposalType.WORKSHOP ? 'text-indigo-400' : 'text-slate-500'"
                     fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M11.42 15.17L17.25 21A2.652 2.652 0 0021 17.25l-5.877-5.877M11.42 15.17l2.496-3.03c.317-.384.74-.626 1.208-.766M11.42 15.17l-4.655 5.653a2.548 2.548 0 11-3.586-3.586l6.837-5.63m5.108-.233c.55-.164 1.163-.188 1.743-.14a4.5 4.5 0 004.486-6.336l-3.276 3.277a3.004 3.004 0 01-2.25-2.25l3.276-3.276a4.5 4.5 0 00-6.336 4.486c.091 1.076-.071 2.264-.904 2.95l-.102.085m-1.745 1.437L5.909 7.5H4.5L2.25 3.75l1.5-1.5L7.5 4.5v1.409l4.26 4.26m-1.745 1.437l1.745-1.437m6.615 8.206L15.75 15.75M4.867 19.125h.008v.008h-.008v-.008z" />
                </svg>
              </div>
              <div>
                <p class="text-sm font-semibold" [ngClass]="proposalCreate.type === ProposalType.WORKSHOP ? 'text-indigo-400' : 'text-slate-300'">Workshop</p>
                <p class="text-xs text-slate-500">Taller práctico</p>
              </div>
            </div>
          </label>

        </div>
      </div>

      <!-- Botón -->
      <button (click)="createProposal()"
        class="w-full py-3 rounded-xl font-semibold text-sm text-white bg-gradient-to-r from-sky-500 to-indigo-500 hover:from-sky-400 hover:to-indigo-400 shadow-lg shadow-sky-500/20 active:scale-95 transition-all duration-200">
        Enviar propuesta
      </button>

    </div>
  </div>
</div>

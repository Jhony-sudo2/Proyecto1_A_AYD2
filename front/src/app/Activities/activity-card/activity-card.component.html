<div class="bg-slate-900 border rounded-2xl p-5 transition-all duration-200 group"
     [ngClass]="isEditing ? 'border-sky-500/50 shadow-lg shadow-sky-500/10' : 'border-slate-800 hover:border-slate-700'">

  <div class="flex items-start justify-between gap-3 mb-3">

    <div class="flex items-center gap-3">
      <span class="inline-block px-3 py-1 rounded-full text-xs font-semibold"
            [ngClass]="activity.type === 'CONFERENCE'
              ? 'bg-sky-500/10 text-sky-400 border border-sky-500/20'
              : 'bg-indigo-500/10 text-indigo-400 border border-indigo-500/20'">
        {{ activity.type === 'CONFERENCE' ? 'Conferencia' : 'Workshop' }}
      </span>
    </div>

    <div class="flex items-center gap-2 shrink-0">
      <!-- Capacidad -->
      <span *ngIf="activity.type === 'WORKSHOP'" class="text-slate-500 text-xs flex items-center gap-1">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z" />
        </svg>
        {{ activity.capacity }}
      </span>
      <span *ngIf="activity.type === 'CONFERENCE'" class="text-xs text-sky-400/60">Sin límite</span>

      <!-- Acciones de gestión -->
      <ng-container *ngIf="showActions">
        <button (click)="onEdit.emit(activity)"
          class="p-2 rounded-xl text-slate-500 hover:text-sky-400 hover:bg-sky-500/10 border border-transparent hover:border-sky-500/20 transition-all duration-200">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0115.75 21H5.25A2.25 2.25 0 013 18.75V8.25A2.25 2.25 0 015.25 6H10" />
          </svg>
        </button>
        <button (click)="onDelete.emit(activity.id)"
          class="p-2 rounded-xl text-slate-500 hover:text-red-400 hover:bg-red-500/10 border border-transparent hover:border-red-500/20 transition-all duration-200">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" />
          </svg>
        </button>
      </ng-container>
    </div>
  </div>

  <!-- Nombre y descripción -->
  <h3 class="text-white font-bold mb-1">{{ activity.name }}</h3>
  <p class="text-slate-400 text-sm mb-3 line-clamp-2">{{ activity.description }}</p>

  <!-- Speakers -->
  <div *ngIf="activity.speakers && activity.speakers.length > 0" class="mb-3">
    <p class="text-xs text-slate-500 uppercase tracking-widest mb-1.5">Speakers</p>
    <div class="flex flex-wrap gap-1.5">
      <span *ngFor="let speaker of activity.speakers"
            class="flex items-center gap-1 text-xs bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 px-2 py-1 rounded-full">
        <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0" />
        </svg>
        {{ speaker }}
      </span>
    </div>
  </div>

  <!-- Footer: fecha + botón inscripción -->
  <div class="flex items-center justify-between gap-3 mt-2">
    <div class="flex items-center gap-1 text-slate-500 text-xs">
      <svg class="w-3.5 h-3.5 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
      {{ activity.startDate | date:'dd MMM yyyy, HH:mm' }} — {{ activity.endDate | date:'dd MMM yyyy, HH:mm' }}
    </div>

    <!-- Botón inscribirse solo en workshops y si showEnroll -->
    <button *ngIf="showEnroll && activity.type === 'WORKSHOP'"
      (click)="onEnroll.emit(activity.id)"
      class="shrink-0 px-4 py-2 rounded-xl text-xs font-semibold text-white bg-gradient-to-r from-sky-500 to-indigo-500 hover:from-sky-400 hover:to-indigo-400 shadow-md shadow-sky-500/20 active:scale-95 transition-all duration-200">
      Inscribirse
    </button>
  </div>

</div>
